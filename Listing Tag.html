<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listing tags</title>
</head>
<body>
    <h3>Ordered Learners List</h3>
    <ol  type="A">
        
    </ol>
<li>rohit</li>
<li>vishnu</li>
<li>priyanka</li>

<h3>Unordered learners list</h3> 
<ul type="square">
<ul>
    <li>rohit</li>
    <li>vishnu</li>
    <li>priyanka</li>
</ul>

<h3>Description list</h3>
<dl type="i"
    <dt>rohit</dt>
    <dd>Student of Computer Science</dd>
    <dt>vishnu</dt>
    <dd>Student of Mathematics</dd>
    <dt>priyanka</dt>
    <dd>Student of Physics</dd>
</dl>
